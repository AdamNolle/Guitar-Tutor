<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Guitar Tutor — Learn the Fretboard, Chords & Ear Training</title>
  <meta name="description" content="Guitar Tutor is a free, fast app: an interactive fretboard with realistic plucked-string sound, a chord library, ear-training drills, and a metronome." />
  <meta name="theme-color" content="#f3eee2" />
  <meta name="color-scheme" content="light" />

  <!-- Open Graph / social -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Guitar Tutor" />
  <meta property="og:description" content="Interactive fretboard, chord library, ear training, and a metronome — with realistic guitar sound." />

  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
  <link rel="apple-touch-icon" href="/icons/icon-180.png" />

  <!-- Preload the fonts that paint above the fold -->
  <link rel="preload" href="/fonts/space-grotesk.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="/fonts/manrope.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="/fonts/bravura.woff2" as="font" type="font/woff2" crossorigin />

  <!-- Self-hosted fonts. Relative url()s resolve against the document base,
       so they work under any GitHub Pages base path. -->
  <style>
    @font-face{font-family:'Space Grotesk';font-style:normal;font-weight:400 700;font-display:swap;src:url('/fonts/space-grotesk.woff2') format('woff2');}
    @font-face{font-family:'Manrope';font-style:normal;font-weight:400 800;font-display:swap;src:url('/fonts/manrope.woff2') format('woff2');}
    @font-face{font-family:'Bravura';font-display:swap;src:url('/fonts/bravura.woff2') format('woff2');}
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
