<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Fretwise">
  <rect width="512" height="512" rx="112" fill="#f3eee2"/>
  <rect x="120" y="60" width="272" height="392" rx="40" fill="#ece1c9" stroke="#d6c9aa" stroke-width="6"/>
  <!-- strings -->
  <g stroke="#b3a890" stroke-linecap="round">
    <line x1="168" y1="84" x2="168" y2="428" stroke-width="3"/>
    <line x1="212" y1="84" x2="212" y2="428" stroke-width="3.5"/>
    <line x1="256" y1="84" x2="256" y2="428" stroke-width="4"/>
    <line x1="300" y1="84" x2="300" y2="428" stroke-width="4.5"/>
    <line x1="344" y1="84" x2="344" y2="428" stroke-width="5"/>
  </g>
  <!-- frets -->
  <g stroke="#cdbf9d" stroke-width="4">
    <line x1="120" y1="150" x2="392" y2="150"/>
    <line x1="120" y1="226" x2="392" y2="226"/>
    <line x1="120" y1="302" x2="392" y2="302"/>
    <line x1="120" y1="378" x2="392" y2="378"/>
  </g>
  <!-- finger dots -->
  <circle cx="212" cy="188" r="22" fill="#c15f37"/>
  <circle cx="300" cy="264" r="22" fill="#4f8568"/>
  <circle cx="256" cy="340" r="22" fill="#b07d2e"/>
</svg>
